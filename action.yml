name: DevCycle Feature Flag Insights for Pull Requests
description: Identifies changes in DevCycle Feature Flags within a PR, adds a comment to your PRs.
author: DevCycleHQ
branding:
    color: blue
    icon: flag
inputs:
    project-key:
        description: 'Your DevCycle project key (Recommended)'
        required: false
    client-id:
        description: 'Your DevCycle API client ID (Recommended)'
        required: false
    client-secret:
        description: 'Your DevCycle API client secret (Recommended)'
        required: false
    github-token:
        description: 'The GitHub token for your repo'
        required: true
    only-comment-on-change:
        description: 'If true, comments will only be added to PRs when changes to DevCycle variables are detected. Defaults to false.'
        required: false
        default: false
runs:
    using: node24
    main: dist/index.js
