
name: Unit Tests
permissions:
  contents: read

on:
  pull_request

jobs:
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DevCycleHQ/license-action@main
        with:
          language: "javascript"
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - run: corepack enable && yarn --version
    - run: yarn install
    - run: yarn test
